modLoader = "javafml"
loaderVersion = "[1,)"
license = "${mod_license}"
logoFile = "nerotech_logo.png"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
NeroTech - multiloader build (NeoForge).
'''

[[mixins]]
config = "nerotech-common.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Neroland Core — required shared foundation; must load BEFORE NeroTech (ordering = AFTER).
[[dependencies.${mod_id}]]
modId = "nerolandcore"
type = "required"
versionRange = "[1.0,2.0)"
ordering = "AFTER"
side = "BOTH"
