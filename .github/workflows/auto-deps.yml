name: Auto-update dependencies

# Daily resolver that opens PRs bumping the modding dependency pins held as
# version variables in gradle.properties (NeoForge, Forge, NeoForm, Fabric loader +
# API, JEI) — the things Dependabot's Gradle ecosystem cannot see because they
# live in gradle.properties, not in dependency{} blocks.
#
# Two independent PRs (see .github/scripts/update_deps.py):
#   * within-line : bump versions for the Minecraft lines already tracked.
#                   Safe, intended to be mergeable.
#   * mc-jump     : when a newer Minecraft line is published, wire it in as a
#                   new stonecutter node. EXPECTED to need manual cross-version
#                   source fixes — the build log is attached to the PR so the
#                   compile errors become the worklist.
#
# PRs created by GITHUB_TOKEN do NOT trigger other workflows, so each job runs
# its own build check here. Requires the repo setting:
#   Settings -> Actions -> General -> "Allow GitHub Actions to create and
#   approve pull requests".
#
# No personal data is fetched or logged — only public version strings
# (POPIA / GDPR clean).

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC = 08:00 Africa/Johannesburg
  workflow_dispatch:
    inputs:
      include_mc_jumps:
        description: "Also open a PR for a new Minecraft line if one exists"
        type: boolean
        default: true
      base_branch:
        description: "Branch to open PRs against"
        type: string
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-deps
  cancel-in-progress: false

env:
  BASE_BRANCH: ${{ github.event.inputs.base_branch || 'main' }}

jobs:
  within-line:
    name: Within-line dependency bumps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve latest within-line versions
        id: resolve
        run: python3 .github/scripts/update_deps.py --mode within-line --summary-out summary.md

      - name: Setup JDK 25
        if: steps.resolve.outputs.changed == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        if: steps.resolve.outputs.changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Validate multiloader build
        id: build
        if: steps.resolve.outputs.changed == 'true'
        continue-on-error: true
        run: |
          chmod +x ./gradlew
          ./gradlew ${{ steps.resolve.outputs.build_tasks }} --stacktrace

      - name: Open pull request
        if: steps.resolve.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          base: ${{ env.BASE_BRANCH }}
          branch: auto-deps/within-line
          delete-branch: true
          add-paths: |
            gradle.properties
          commit-message: "deps: bump loader/API versions (within Minecraft line)"
          title: "deps: within-line dependency bumps"
          labels: |
            dependencies
            gradle
            automated
          body: |
            Automated **within-line** dependency update (NeoForge / Forge / NeoForm / Fabric / JEI) for the Minecraft versions already tracked.

            ${{ steps.resolve.outputs.summary }}

            ---
            **Build check:** `${{ steps.build.outcome }}` (tasks: `${{ steps.resolve.outputs.build_tasks }}`)

            Generated by `.github/workflows/auto-deps.yml`.

  mc-jump:
    name: Minecraft version jump
    runs-on: ubuntu-latest
    # Runs on the daily schedule, or when manually dispatched with the toggle on.
    if: ${{ github.event_name == 'schedule' || github.event.inputs.include_mc_jumps == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect + wire a new Minecraft line
        id: resolve
        run: python3 .github/scripts/update_deps.py --mode mc-jump --summary-out summary.md

      - name: Setup JDK 25
        if: steps.resolve.outputs.changed == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        if: steps.resolve.outputs.changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Validate multiloader build (failures expected on a jump)
        id: build
        if: steps.resolve.outputs.changed == 'true'
        continue-on-error: true
        run: |
          chmod +x ./gradlew
          ./gradlew ${{ steps.resolve.outputs.build_tasks }} --stacktrace

      - name: Open pull request
        if: steps.resolve.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          base: ${{ env.BASE_BRANCH }}
          branch: auto-deps/mc-${{ steps.resolve.outputs.new_mc }}
          delete-branch: true
          add-paths: |
            gradle.properties
            settings.gradle
            .github/workflows/multiloader.yml
          commit-message: "deps: wire Minecraft ${{ steps.resolve.outputs.new_mc }} stonecutter node"
          title: "deps: Minecraft ${{ steps.resolve.outputs.new_mc }} (NEW LINE — needs manual fixes)"
          labels: |
            dependencies
            minecraft-version
            automated
          body: |
            Automated **Minecraft version jump** to `${{ steps.resolve.outputs.new_mc }}`.

            ${{ steps.resolve.outputs.summary }}

            > [!WARNING]
            > A new Minecraft line almost always breaks source — see `CLAUDE.md` on 26.x API divergence. This PR wires the new stonecutter node and bumps the pins; the **build check below is the starting worklist**, not a sign the change is broken.

            ---
            **Build check:** `${{ steps.build.outcome }}` (tasks: `${{ steps.resolve.outputs.build_tasks }}`)

            Generated by `.github/workflows/auto-deps.yml`.
