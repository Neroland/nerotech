name: Publish

# Builds and publishes the MULTILOADER mod (all 6 cells: fabric/neoforge/forge x 26.1.2/26.2)
# whenever the mod_version in gradle.properties has no published release yet.
#
# Pipeline (4 jobs):
#   detect  -> is there a v<mod_version> release tag yet? (read-only ledger check)
#   build   -> build all 6 cells once; extract release notes; upload the 6 distributable
#              jars + notes as the `dist` artifact.
#   publish -> matrix over the 6 cells: download `dist`, upload each jar to CurseForge +
#              Modrinth as its own version tagged with the EXACT loader + game-version (each
#              version self-contained, carrying its own copy of the changelog).
#   release -> runs LAST (needs: publish): download `dist`, register the Sentry release, then
#              create the single GitHub Release + the v<version> tag. That tag is the ledger
#              `detect` checks, so creating it last means a failed CF/MR upload leaves NO tag
#              and a re-run retries cleanly instead of being skipped.
#
# Re-runs are safe: an already-released version (tag exists) is skipped. `workflow_dispatch`
# runs the same check manually (catch up a missed release without a dummy commit).
#
# Supply chain: third-party actions are pinned to commit SHAs (these steps hold publish
# tokens); the trailing `# vX` comment is the human-readable tag for Dependabot/updates.
# Privacy (POPIA/GDPR): only version strings + curated release notes are handled or logged -
# no personal data.

on:
  push:
    branches: [main, enhancement/multi-loader-support]
    paths:
      - gradle.properties
  workflow_dispatch:

# Least privilege by default; only the `release` job is granted write to create the Release/tag.
permissions:
  contents: read

jobs:
  detect:
    name: Detect unreleased version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Tags are the release ledger - fetch them for the existence check.
          fetch-depth: 1
          fetch-tags: true

      - name: Check whether mod_version already has a release tag
        id: check
        run: |
          read_version() { grep -E '^mod_version=' "$1" | head -n1 | cut -d= -f2 | tr -d '[:space:]'; }

          CURRENT="$(read_version gradle.properties)"
          echo "current=$CURRENT"

          if [ -z "$CURRENT" ]; then
            echo "::error::Could not read mod_version from gradle.properties"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/v$CURRENT" >/dev/null; then
            echo "v$CURRENT is already released (tag exists); skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$CURRENT has no release tag yet; publishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

  build:
    name: Build all cells
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.channel.outputs.environment }}
      version_type: ${{ steps.channel.outputs.version_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Setup JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Build all six cells (loader x MC version). Each produces a distinctly named jar under
      # <loader>/versions/<mc>/build/libs. Forge's distributable is the jarJar output
      # ("*-all.jar", with embedded Sentry); the plain Forge jar is not shipped.
      - name: Build all cells
        run: >-
          ./gradlew
          :fabric:26.1.2:build :fabric:26.2:build
          :neoforge:26.1.2:build :neoforge:26.2:build
          :forge:26.1.2:build :forge:26.2:build
          --stacktrace

      # Release channel from the version suffix: -alpha -> alpha, -beta -> beta, else release.
      # Used by Sentry (environment) and the publish targets (version-type). NeroTechTelemetry
      # derives its environment the same way. Version is passed via env, not ${{ }} interpolation
      # into the script body (defence in depth). Privacy: logs only the version string.
      - name: Determine release channel
        id: channel
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          case "$VERSION" in
            *-alpha*) echo "environment=alpha"      >> "$GITHUB_OUTPUT"
                      echo "version_type=alpha"     >> "$GITHUB_OUTPUT" ;;
            *-beta*)  echo "environment=beta"       >> "$GITHUB_OUTPUT"
                      echo "version_type=beta"      >> "$GITHUB_OUTPUT" ;;
            *)        echo "environment=production" >> "$GITHUB_OUTPUT"
                      echo "version_type=release"   >> "$GITHUB_OUTPUT" ;;
          esac

      # Pull this version's section from CHANGELOG.md (Keep-a-Changelog headings) for the
      # release notes. Literal prefix match (no regex on the version, so dots in "1.0.0" can't
      # act as wildcards). Falls back to a placeholder if the file OR the section is missing.
      - name: Extract changelog section
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found; using a placeholder."
            echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
          else
            awk -v ver="$VERSION" '
              !found && index($0, "## [" ver "]") == 1 { found = 1; next }
              found && /^## \[/ { exit }
              found && /^\[[^]]+\]: / { next }   # skip link-definition lines
              found { print }
            ' CHANGELOG.md > RELEASE_NOTES.md
            if [ ! -s RELEASE_NOTES.md ]; then
              echo "::warning::No CHANGELOG.md section for $VERSION; using a placeholder."
              echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
            fi
          fi
          cat RELEASE_NOTES.md

      # Gather exactly the six distributable jars (Forge = the -all jarJar build) + the release
      # notes into dist/. `bash -e` aborts loudly if any expected jar is missing (e.g. a name
      # mismatch), and upload-artifact fails on an empty dist/ - so a path drift can't publish nothing.
      - name: Collect distributables
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          mkdir -p dist
          cp "fabric/versions/26.1.2/build/libs/nerotech-fabric-26.1.2-$VERSION.jar"     dist/
          cp "fabric/versions/26.2/build/libs/nerotech-fabric-26.2-$VERSION.jar"         dist/
          cp "neoforge/versions/26.1.2/build/libs/nerotech-neoforge-26.1.2-$VERSION.jar" dist/
          cp "neoforge/versions/26.2/build/libs/nerotech-neoforge-26.2-$VERSION.jar"     dist/
          cp "forge/versions/26.1.2/build/libs/nerotech-forge-26.1.2-$VERSION-all.jar"   dist/
          cp "forge/versions/26.2/build/libs/nerotech-forge-26.2-$VERSION-all.jar"       dist/
          cp RELEASE_NOTES.md dist/
          ls -l dist/

      - name: Upload distributables
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish ${{ matrix.label }} ${{ matrix.mc }} (CurseForge + Modrinth)
    needs: [detect, build]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      # Gentle on the CurseForge/Modrinth APIs vs. firing all six uploads at once.
      max-parallel: 2
      matrix:
        include:
          - { loader: fabric,   mc: "26.1.2", label: "Fabric",   suffix: "" }
          - { loader: fabric,   mc: "26.2",   label: "Fabric",   suffix: "" }
          - { loader: neoforge, mc: "26.1.2", label: "NeoForge", suffix: "" }
          - { loader: neoforge, mc: "26.2",   label: "NeoForge", suffix: "" }
          - { loader: forge,    mc: "26.1.2", label: "Forge",    suffix: "-all" }
          - { loader: forge,    mc: "26.2",   label: "Forge",    suffix: "-all" }
    steps:
      - name: Download distributables
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist

      # One CurseForge/Modrinth version per cell, each tagged with its EXACT loader +
      # game-version (so no jar is mislabelled). Each version carries its own copy of the
      # changelog (self-contained per the chosen layout).
      - name: Publish to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@995edadc13559a8b28d0b7e6571229f067ec7659 # v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: NeroTech ${{ needs.detect.outputs.version }} - ${{ matrix.label }} ${{ matrix.mc }}
          version: ${{ needs.detect.outputs.version }}-${{ matrix.loader }}-${{ matrix.mc }}
          version-type: ${{ needs.build.outputs.version_type }}
          changelog-file: dist/RELEASE_NOTES.md
          files: dist/nerotech-${{ matrix.loader }}-${{ matrix.mc }}-${{ needs.detect.outputs.version }}${{ matrix.suffix }}.jar
          loaders: ${{ matrix.loader }}
          game-versions: ${{ matrix.mc }}
          java: 25

  release:
    name: GitHub Release + Sentry
    needs: [detect, build, publish]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + v<version> tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download distributables
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist

      # Register the release in Sentry so error reports group per mod version. The release name
      # must match what the SDK sends (NeroTechTelemetry: release "nerotech@<mod_version>").
      # Requires repository secrets: SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT.
      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: nerotech@${{ needs.detect.outputs.version }}
          environment: ${{ needs.build.outputs.environment }}

      # One GitHub Release carrying all six jars. This also creates the v<version> tag that
      # `detect` reads as the release ledger - intentionally the LAST step, so a failed CF/MR
      # upload above leaves no tag and a re-run retries cleanly instead of being skipped.
      - name: Publish GitHub Release
        uses: Kir-Antipov/mc-publish@995edadc13559a8b28d0b7e6571229f067ec7659 # v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.detect.outputs.version }}
          name: NeroTech ${{ needs.detect.outputs.version }}
          version: ${{ needs.detect.outputs.version }}
          version-type: ${{ needs.build.outputs.version_type }}
          changelog-file: dist/RELEASE_NOTES.md
          # dist/ holds exactly the six distributables (Forge = -all), so this glob is precise.
          files: dist/*.jar
          java: 25
